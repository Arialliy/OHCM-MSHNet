train:
  model_names: OHCMMSHNet
  dataset_names: NUDT-SIRST
  patchSize: 256
  batchSize: 4
  nEpochs: 400
  optimizer_name: Adagrad
  threads: 1
  intervals: 10
  mshnet_warm_epoch: 5
  mshnet_in_channels: 1

ohcm:
  online_hard_clutter_mining: true
  clutterness_head: true
  clutter_aware_inhibition: true
  suppression_loss: true
  margin_loss: true
  prototype_memory: false
  lambda_proto: 0.0
  ohcm_warm_epoch: 60
  ohcm_tau: 0.5
  ohcm_dilate_radius: 5
  ohcm_topk: 3
  ohcm_gamma_max: 0.3
  ohcm_gamma_ramp_epochs: 60
  ohcm_margin_m: 0.1
  ohcm_margin_delta: 0.5
  ohcm_mining_mode: cc_area_lc_ms
  lambda_clu: 0.2
  lambda_sup: 0.5
  lambda_margin: 0.1

three_seed_gate:
  seeds: [0, 1, 2]
  hc_miou_mean_min: 0.59
  hc_fa_ppm_mean_max: 240
  hc_precision_mean_min: 0.72
  note: "If unstable, tune OHCM only. Do not return to the full/prototype branch."
