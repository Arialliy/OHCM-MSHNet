source:
  frozen_checkpoint: /home/ly/AAAI/OHCM-MSHNet/checkpoints/OHCM-light_best.pth
  frozen_internal_config: /home/ly/AAAI/OHCM-MSHNet/configs/OHCM-light.yaml
